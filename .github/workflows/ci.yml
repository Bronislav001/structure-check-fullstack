name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  backend-tests:
    name: 1. Backend tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: server
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: server
        run: pytest -q

  frontend-tests:
    name: 2. Frontend tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: client
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set progress false
          npm install --legacy-peer-deps --no-audit --no-fund --fetch-retries=5 --fetch-timeout=120000

      - name: Run frontend tests
        working-directory: client
        run: npm run test

      - name: Build frontend
        working-directory: client
        run: npm run build

  e2e-tests:
    name: 3. E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: server
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: client
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set progress false
          npm install --legacy-peer-deps --no-audit --no-fund --fetch-retries=5 --fetch-timeout=120000

      - name: Install Playwright browser
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: server
        run: |
          python -m uvicorn app.main:app --app-dir . --host 127.0.0.1 --port 8080 > backend.log 2>&1 &

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/docs > /dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend..."
            sleep 2
          done
          echo "Backend did not start"
          cat server/backend.log || true
          exit 1

      - name: Start frontend
        working-directory: client
        run: |
          VITE_API_URL=http://127.0.0.1:8080 npm run dev -- --host 127.0.0.1 --port 5173 > frontend.log 2>&1 &

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5173 > /dev/null; then
              echo "Frontend is ready"
              exit 0
            fi
            echo "Waiting for frontend..."
            sleep 2
          done
          echo "Frontend did not start"
          cat client/frontend.log || true
          exit 1

      - name: Run E2E tests
        working-directory: client
        run: npm run test:e2e

  docker-build:
    name: Docker build after 3 tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, e2e-tests]
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t struct-check-backend ./server

      - name: Build frontend image
        run: docker build -t struct-check-frontend ./client

      - name: Compose config validation
        run: docker compose config