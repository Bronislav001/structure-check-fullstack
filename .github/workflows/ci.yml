name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    name: 1. Backend tests (pytest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run backend tests
        run: pytest -q

  frontend-tests:
    name: 2. Frontend tests (Vitest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  e2e-tests:
    name: 3. E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: |
          npm config set registry https://registry.npmjs.org/
          npm install --legacy-peer-deps --no-audit --no-fund --fetch-retries=5 --fetch-timeout=120000

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

  docker-build:
    name: Docker build after 3 tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, e2e-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t struct-check-backend ./server

      - name: Build frontend image
        run: docker build -t struct-check-frontend ./client

      - name: Compose config validation
        run: docker compose config
